body:
  text: 提要歸愚詞詞曲類一詞集之屬臣等謹案歸愚詞一卷宋葛立方撰立方有韻語陽秋已别著録此歸愚詞一卷與陳振孫書録解題合宋人之中父子以填詞名家者惟晏殊晏幾道後則立方與其父勝仲為最著然詞多平實鋪叙少清新宛轉之思而大致不失宋人規格流傳既久存之亦可備詞中一家毛晉嘗稱集內雨中花眼兒媚兩調俱不合譜未敢妄為更定今參考名家詞集其眼兒媚乃朝中措之訛歐陽修平山闌檻倚晴空一闋可以互證至雨中花調立方兩詞叠韻初無舛誤以詞律反覆勘之實題中脫一慢字此調京鏜辛棄疾皆有傳作立方詞起三句可依辛詞讀第四第五句京辛兩家皆作上五下四立方則作上六下三雖微有不同而同是九字其餘則不獨字數相符平仄亦毫無相戾其為雨中花慢實無可疑晉蓋考之未審他如滿庭芳一調連成十闋凡後半換二字有用韻者亦有不用韻而直作五字句者考宋人此調此二字本無定式山谷詞用韻書舟詞不用韻立方兩存其體亦非傳寫有異同也克齊詞詞曲類一詞集之屬臣等謹案克齊詞一卷宋沈端節撰端節字約之吳興人是集見陳振孫書録解題然振孫亦不詳其始末毛晉跋語疑其即詠賈耘老苕上水閣沈㑹宗之同族亦無確證惟湖州府志及溧陽縣志均載端節寓居溧陽嘗令蕪湖知衡州提舉江東茶鹽淳熙間官至朝散大夫其說必有所據獨載其詞名充齊集則充克二字形近致訛耳其詞僅四十餘闋多有調而無題考花間諸集往往調即是題如女冠子則詠女道士河瀆神則為送迎神曲虞美人則詠虞姬之類唐末五代諸詞例原如是後人題詠漸繁題與調兩不相涉若非存其本事則詞意俱不可詳集中如念奴嬌二闋之稱太守青玉案第一闋之稱使君第三闋之稱賢侯竟不知所贈何人至念奴嬌尋幽覽勝一闋似屬端節自道據詞中自笑飄零驚嵗晚欲挂衣冠神武及羣玉圖書廣寒宫殿一一經行處云云則端節固當曽官京職以其題已佚遂無援據宋人詞集似此者頗少疑原本必屬調與題全輾轉傳寫茍趨簡易遂遭刪削耳今無可考補姑仍其舊至其吐屬婉約頗具風致固不以花菴草堂諸選不見採録減價矣龍川詞詞曲類一詞集之屬臣等謹案龍川詞一卷補遺一卷宋陳亮撰亮有龍川集别著録宋史藝文志載其詞四卷今不傳此集凡詞三十首巳具載本集然前後不甚銓次其本為毛晉所刋分調類編後有跋稱據家藏舊刻蓋摘出别行之本又補遺七首則從黃升花菴詞選採入者詞多纖麗與今集逈殊或疑􅎓作毛晉跋稱黃升與亮俱南渡後人何至謬誤若此或升惟選綺艷一種而亮子沈所編今集特表其父磊落骨幹故若出二手云云理或然也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
