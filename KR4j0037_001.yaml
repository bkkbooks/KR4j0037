body:
  text: 歸愚詞宋葛立方撰滿庭芳催梅霜葉停飛氷魚初躍梅花猶悶芳叢剪酥裝玉應為費天工爭奈江南驛使征鞍待一朵香濃慿誰報氷肌仙子聞早駕飛龍溶溶春意動寒姿未展終愧羣紅與斬新末上閒伴長松要看黃昏庭院橫斜映霜月朦朧蘭堂畔巡簷索笑誰羡杜陵翁又和催梅未許蜂知難交雀啅芳叢猶是寒叢東方解凍春仗做春工何事仙葩未放寒苞祕氷麝香濃應須是驚聞羯鼓誰敢噴髯龍梅花君自看丁香已白桃臉將紅結嵗寒三友久遲筠松要看含章簷下閒粧靚春睡朦朧知音是凍雲影底鐵面葛仙翁又探梅狂吹鳴籬祥霙剪水分明欺壓寒梅氷威初斂曦影上池臺應有一番和氣南枝上恐有春來須勤探呼吾笻杖屐齒上蒼苔春風渾未到裴回香徑巡繞千回見瓊英一㸃小占條枚且看先鋒鬬艷看看便繁蕾齊開香浮動微薰詩夢須更著詩催又賞梅臘雪方凝春曦俄漏畫堂小秩芳筵玉壺仙蕊簾外羃瑶烟莫話靑山萬樹聊須對一段孤妍杯行處香參鼻觀百濯未為賢吾廬何處好繡香竹畔偶桂溪邊且為渠珍重滿泛金船已拚春醒一枕如今且醉倒花前花飛後歡呼一笑又是說明年又泛梅庾信何愁休文何瘦范叔一見何寒梅花酷似索笑畫檐看便肯嫣然一笑疏籬上玉臉氷顔須勤賞莫教靑子半著樹頭酸朱䦨聊掩映昆崘頂上琪樹團欒命兒曹班坐草草杯盤旋折溪邊數朵璚蕤泛蕉葉杯寬從教看尊前有客拍手笑頽山又簪梅弄月黃昏封霜淸曉數枝影墮溪濱化工仙手幻出一畨新片片雕酥碾玉寒苞似已泄香塵聊相對畸人投分尊酒認荀陳吾年今老矣佳人薄相笑插林中愧蒼顔白髮回授烏雲玉鏡臺邊試看相宜是淺笑輕顰君知否壽陽額上不似髮邊春又評梅一陳清香不知來處元來梅已舒英出籬含笑芳意為人傾細看髙標孤韻誰家有别得花人應須是魏徵嫵媚夷甫太鮮明北枝方半吐水邊疏影綽約娉婷問橫空皎月匝地寒霙何似此花清絶慿君為子細推評幽竒處素娥靑女著意為橫陳又扉映琉璃窗搖雲母水堂新甃雲灣際天波面玉鏡寶奩寬欄外靑山幾疊瑶烟斂影落千鬟寒汀晚蘆花飛雪風定白鷗閒塵寰何處有方壺圓嶠弱水波翻問何如藜杖此地躋攀種竹今逾萬個風枝靜日報平安他年事蒼雲屯處千畝看栖鸞又五姪將赴當塗自金壇來别栗里田園烏衣門巷别來幾換星霜華陽仙窟翠桁綵衣香夢墮當塗風月披絳帳欲指鱣堂浮鷗外來寧老子特泛霅溪航相逢春正好梅舒香白栁曵宫黃且相將一笑樂未渠央須念離多㑹少難輕負百榼霞漿深深觀舞回飛雪樂奏小宫商又胡汝明罷帥歸坐間次韻作江國麾幢邊城鼓角湓川幾報嚴更笑談油幕英傑為時生腹貯六韜三略新詩就矛槊頻橫功名事他年未晚一笴落欃槍歸來何早計白蘋洲畔䤥穫深耕又何如竹帛彝鼎垂名犀節徴還伊趂春風外文鷁催行岩廊上談兵齒頰讜論佐休明錦堂春慢正旦作氣應三陽氛澄六幕翔烏初上雲端問朝來何事喜動門䦨田父占來好嵗星說道宜官擬更慿髙望逺春在烟波春在晴巒歌管雕堂宴喜任重簾不捲交護春寒況金叉整整玉樹團團柏葉輕浮重醑梅枝巧綴新幡共祝年年如願壽過松椿壽過彭𣆀水龍吟遊釣臺作九州雄傑溪山遂安自古稱佳處雲迷半嶺風號淺瀨輕舟斜渡朱閣橫飛漁磯無恙鳥啼林塢弔髙人陳迹空瞻遺像知英烈垂千古憶昔龍飛光武悵當年故人何許羊裘自貴龍章難换不如歸去七里溪邊鸕鷥源畔一蓑烟雨嘆如今宕子翻將釣手遮日向西秦路菩薩鬘侍飲賞黃花井梧葉葉秋風晚東籬㸃㸃金錢滿開急為重陽日烘深院香幽姿無衆草莫恨生非早嚼蕊傍池臺壽公桑落杯風流子元旦作夜半春陽啓東風峭猶帶去年寒嘆榆塞戰塵玉關烟燧壯心耿耿靑鬢斑斑又還是一年頭上到日月信跳丸門帖繪雞厯頒金鳯酒浮柏葉人頌椒盤幽園春信近簾櫳靜小宴取次追歡聊愛水沉烟裊清唱聲閒況良辰漸有梅舒瓊蕊栁搖金縷巧綴新幡莫惜醉吟親側衣曵荆蘭又細草芳南苑東風裏贏得一身閒見花朵繡田栁絲絡岸沼氷方泮山雪初殘又還是隴頭春信動梅蕊入征鞍月裏暗香水邊疏影淡粧宜瘦玉骨禁寒泛金溪上好開幽户聊面翠麓雲灣知道醉吟堪老名利難關算書帷意懶宦塗遊倦舊時習氣惟有躋攀擬待杖藜花底直到春䦨多麗賞梅冷雲收小園一段瑶芳乍春來未回窮臘幾枝開犯嚴霜傍黃昏暗香浮動照淸淺疏影低昻却月幽姿含章媚態姮娥姑射下仙鄉倚䦨看殷勤持酒索笑也何妨堪憐處東君不管獨自淒涼算何人為伊銷斷古今才子篇章有西湖賦詩處士更東閣年少臺郎驛使來時吳王醉處幾番牽動廣平腸賸宴賞微酸如豆又是隔年長髙樓外莫教羌管吹墮寒香又七夕遊蓮蕩作破波光如鏡三翼輕舟對雨餘重岩疊嶂何妨影墮清流望芙蕖渺然如海張雲錦掩映汀洲出水竒姿凌波豔態眼看一葉弄新秋恍疑是金沙池內玉井認峯頭花深處田田葉底魚戲龜遊正微涼西風初度一彎斜月如鈎想天津鵲橋將駕看寶奩蛛網初抽晒腹何堪穿針無緒不如溪上少淹留競笑語追尋惟有沉醉可忘憂慿清唱一聲檀板驚起沙鷗沙塞子詠梅天生玉骨氷肌瘦損也知他為誰寒底傲霜凌雪不教春知髙樓橫笛試輕吹要一片花飛酒巵拚沉醉帽簷斜插折取南枝春光好立道生日作去年曾壽生朝正黃菊初舒翠翹今嵗雕堂重預宴梨雪香飄是時梨花盛開故云明年應傍丹霄看寶胯重重在腰鵲尾吹香籠繡段且醉金蕉又寒食將過淮作禁烟却釀春愁正繫馬清淮渡頭後日清明催疊鼓應在揚州歸時元已臨流要綺陌芳郊恣遊三月羇懷當一洗莫放觥籌西江月開爐風送丹楓卷地霜乾枯葦鳴溪獸爐重展向深閨紅入麒麟方熾翠箔低垂銀蒜羅幃小釘金泥笙歌送我玉東西誰管瑶花舞砌蝶戀花冬至席上作緹室羣隂清曉散灰動葭莩漸覺微陽扇日永繡工才一線挈壺已報添銀箭六幕無塵開碧漢非霧非煙倣佛登臺見梅萼飄香縈小宴霞漿莫放琉璃淺清平樂子直過省生日候殿試席間作文章驚世半挹南宫第蟾窟澄輝天似洗折得窅窊丹桂當年蓬矢生賢流霞滿祝長年更願巨鰲連釣楓宸第一臚傳減字木蘭花四姪遇省候廷試席上作搖毫鑄藻縱有徽之應壓倒萬里鵬程南省今書淡墨名臚傳丹陛月裏桂花先著袂雁塔髙題玉季巍科尚覺低又章甥築地相望作張南周北漫說清漳搖紺碧何似幽棲甥舅相望共一溪璇題沙版不用買鄰糜百萬餘户增輝庭列芝蘭户㦸枝水調歌頭睡鴨凝香縷白酒瀉無聲郊墟不辦羊酪照筯紫絲蓴此去青山深處邀得白雲為伴絶意請長纓一舸背君去幾幅布帆輕帝恩重容祿隱吏祠庭膝間文度安親得計是揚名珍重金蘭交契共惜匆匆别去送我幾煙林異日懷君處凝睇亂層岑玉漏遲窗户明環堵山容黛染水光綃舞荷蓋擎煙花映步波神女嫩臉鉛華掩素無語向薰風凝竚晴又雨征鞞隱隱雲洲沙渚須㬰風捲還晴看泄丹囊乍飄沉炷魚颭荷衣珠顆亂傾無數休話金沙玉井爭似我神龜處觴為舉何人解歌金縷行香子風透紗窗葉落銀床夾纈林吹下嚴霜新篘浮蟻班坐飛觴有岩中秀籬中艷洛中香金鈿放蕊玉粒爭芳噴年年來趂清商不應素節還有花王看正封詩龜年調太真狂玉樓春雪中擁爐聞琵琶作靑女飛花濃剪水寒氣霏微度窗紙人間那得骨為簾罏有麒麟樽有蟻笙簧凍澀閒纎指香霧暖薰羅帳底却教試作忽雷聲往往驚開桃與李鷓鴣天小孫周晬席上作榴花庭院戲氍毹水剪雙眸畫不如莫恨未能通瑟僴只今先已辨之無虎睛淺綴新花帽龍腦濃薰小繡襦乃祖未須貽厥力及時須讀五車書浪淘沙子直新第落成席上作休看輞川圖未是幽居何如雲水繞儲胥新溼青紅開棟宇霧拱風疏小圃秀郊墟花破平蕪五峰列影水平鋪只缺五城樓十二便是蓬壺卜算子賞荷以蓮葉勸酒作明鏡蓋紅蕖軒户臨煙渚窣窣珠簾淡淡風香裡開樽俎莫把碧筒彎恐帶荷心苦喚我溪邊太乙舟㶑灧盛芳醑又席間再作裊裊水芝紅脈脈蒹葭浦淅淅西風淡淡煙幾㸃疏疏雨草草展杯觴對此盈盈女葉葉紅衣當酒船細細流霞舉夜行船章甥婚席間作百尺雕堂懸蜀繡珠簾外玉䦨瓊甃調鼎名家吹簫賢胄新卜鳯凰佳耦銀葉添香香滿袖滿金杯壽君芳酒喜動蟾宫祥生熊帳應在細君歸後雨中花慢睢陽途中小雨見桃李盛開作壯嵗嬉遊樂事幾經靑門紫陌芳春未見廉纎膏雨浥花塵濯錦寶絲增艷洗粧玉頰尤新向韶光濃處㸃染芳菲總是東君蘇州老子經雨南園為誰一掃花林誰信道佳聲著處肌潤香勻曉洗何郎湯餅莫留巫女行雲寄言遊子也須留眄小駐蹄輪又奉使途中作和前韻寄徑睢陽陌上忽看天桃穠李爭春又見楚宫行雨洗芳塵紅艷霞光夕照素華瓊樹朝新為竒姿芳潤擬倩遊絲留住東君拾遺杜老猶愛南塘寄情蘿薜山林爭似此花如姝麗獺髓輕勻不數江陵玉杖休誇花島紅雲少須澄霽一番清影更待氷輪好事近歸有期作幾騎漢旌回喜動滿川花木遙睇淸淮古岸散離愁千斛煙籠沙嘴定連艘鵲腳蘸波緑歸話隔年心事秉夜䦨銀燭又和子直惜春歸日指清明肯把話言輕食已是飛花時候賴東風無力靑帘沽酒送春歸莫惜萬金擲屈指明年春事有紅梅消息眼兒媚回至汴京喜而成長短句暫時莫蕩出燕然氷柱凍層簷時節馬蹄歸路楊花亂朴征韀如今歸去銀鐺宜見七寶床邊待得退朝花底家人爭捲珠簾歸愚詞
